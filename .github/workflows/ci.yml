name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 45
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test dealer state contracts
        run: npm run test:dealer-state

      - name: Build
        run: npm run build

      - name: Install Playwright browsers and hosted dependencies
        if: ${{ vars.CI_RUNNER == '' }}
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Install Playwright browsers on self-hosted runner
        if: ${{ vars.CI_RUNNER != '' }}
        run: npx playwright install chromium firefox webkit

      - name: Test admin responsive contract
        run: npm run test:e2e

      - name: Test checked appearance route inventory
        run: npx tsx --test tests/appearance-route-inventory.test.ts

      - name: Test renderer, mode, browser and viewport matrix
        run: npm run test:e2e:appearance:matrix

      - name: Test dealer Pages PWA contract
        run: npm run test:e2e:dealer-pages

      - name: Test dual-renderer Pages and offline recovery
        run: npm run test:e2e:appearance:pages -- --project=chromium

      - name: Test real browsers and devices when release credentials are configured
        if: ${{ env.BROWSERSTACK_USERNAME != '' && env.BROWSERSTACK_ACCESS_KEY != '' }}
        run: npm run test:e2e:appearance:real-devices
